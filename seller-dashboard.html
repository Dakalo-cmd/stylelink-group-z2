<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StyleLink Seller Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#111;
padding:30px 20px;
border-right:1px solid #262626;
}

.logo{
font-size:28px;
font-weight:700;
color:#D4AF37;
margin-bottom:40px;
text-align:center;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu a{
text-decoration:none;
color:#ccc;
padding:15px;
border-radius:10px;
transition:.3s;
font-weight:500;
}

.menu a:hover,
.menu a.active{
background:#D4AF37;
color:#000;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.header h1{
font-size:32px;
}

.addBtn{
background:#D4AF37;
color:#000;
border:none;
padding:14px 28px;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.addBtn:hover{
transform:translateY(-2px);
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:#181818;
padding:25px;
border-radius:15px;
border:1px solid #222;
transition:.3s;
}

.card:hover{
border-color:#D4AF37;
transform:translateY(-5px);
}

.card h3{
color:#999;
font-size:15px;
margin-bottom:10px;
}

.card h2{
font-size:34px;
color:#D4AF37;
}

/* Placeholder */

.content{
background:#181818;
border:1px solid #222;
border-radius:15px;
padding:40px;
text-align:center;
}

.content h2{
margin-bottom:15px;
}

.content p{
color:#999;
}

/* Responsive */

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid #222;
}

.menu{
flex-direction:row;
flex-wrap:wrap;
justify-content:center;
}

.header{
flex-direction:column;
align-items:flex-start;
}

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:20px;
}

.field{
display:flex;
flex-direction:column;
margin-bottom:20px;
}

.field label{
margin-bottom:8px;
font-weight:500;
color:#D4AF37;
}

.field input,
.field select,
.field textarea{

background:#111;
border:1px solid #333;
color:white;
padding:14px;
border-radius:10px;
outline:none;

}

.field textarea{

height:130px;
resize:none;

}

.publishBtn{

background:#D4AF37;
color:#000;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;

}

.publishBtn:hover{

opacity:.9;

}

.productTable{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

.productTable th{

background:#D4AF37;
color:#000;
padding:15px;

}

.productTable td{

padding:15px;
text-align:center;
border-bottom:1px solid #333;

}

.productTable img{

width:70px;
height:70px;
object-fit:cover;
border-radius:8px;

}

.deleteBtn{

background:#ef4444;
color:white;
border:none;
padding:10px 18px;
cursor:pointer;
border-radius:8px;

}

.editBtn{

background:#3b82f6;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-right:8px;
}

.modal{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999;

}

.modalContent{

background:#181818;
padding:30px;
width:500px;
max-width:90%;
border-radius:15px;

}

.modalContent input,
.modalContent select,
.modalContent textarea{

width:100%;
margin:10px 0;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:8px;

}

.modalButtons{

margin-top:20px;
display:flex;
gap:10px;

}

.modalButtons button{

flex:1;
padding:14px;
background:#D4AF37;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:bold;

}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
StyleLink
</div>

<div class="menu">

<a href="#" class="active">🏠 Dashboard</a>

<a href="#">📦 Products</a>

<a href="#">🛒 Orders</a>

<a href="#">⭐ Reviews</a>

<a href="#">💬 Messages</a>

<a href="#">⚙ Settings</a>

<a href="#">🚪 Logout</a>

</div>

</div>

<!-- Main -->

<div class="main">

<div class="header">

<h1>Seller Dashboard</h1>

<button class="addBtn" onclick="showForm()">
+ Add Product
</button>

</div>

<div class="cards">

<div class="card">
<h3>Total Products</h3>
<h2 id="totalProducts">0</h2>
</div>

<div class="card">
<h3>Total Orders</h3>
<h2>0</h2>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h2>R0</h2>
</div>

<div class="card">
<h3>Followers</h3>
<h2>0</h2>
</div>

</div>

<div class="content">

<h2 style="margin-bottom:30px;">Add New Product</h2>

<form id="productForm">

<div class="grid">

<div class="field">
<label>Product Name</label>
<input type="text" id="name" required>
</div>

<div class="field">
<label>Brand</label>
<input type="text" id="brand">
</div>

<div class="field">
<label>Category</label>
<select id="category">
<option>Dress</option>
<option>Shoes</option>
<option>Accessories</option>
<option>Bags</option>
<option>Jewelry</option>
<option>Other</option>
</select>
</div>

<div class="field">
<label>Price (R)</label>
<input type="number" id="price">
</div>

<div class="field">
<label>Stock</label>
<input type="number" id="stock">
</div>

<div class="field">
<label>Size</label>
<input type="text" id="size" placeholder="S, M, L, XL">
</div>

<div class="field">
<label>Color</label>
<input type="text" id="color">
</div>

<div class="field">
<label>Gender</label>
<select id="gender">
<option>Men</option>
<option>Women</option>
<option>Unisex</option>
<option>Kids</option>
</select>
</div>

<div class="field">
<label>Condition</label>
<select id="condition">
<option>New</option>
<option>Used</option>
</select>
</div>

<div class="field">
<label>Location</label>
<input type="text" id="location">
</div>

<div class="field">
<label>Seller Name</label>
<input type="text" id="seller_name">
</div>

</div>

<div class="field">
<label>Description</label>
<textarea id="description"></textarea>
</div>

<div class="field">
<label>Product Image</label>

<input
type="file"
id="imageFile"
accept="image/*">

</div>

<img
id="preview"
style="
width:220px;
display:none;
margin-top:20px;
border-radius:12px;
border:2px solid #D4AF37;
">

<br><br>

<button
type="submit"
class="publishBtn">

Publish Product

</button>

</form>

<hr style="margin:50px 0;border-color:#333;">

<h2 style="margin-bottom:20px;">
My Products
</h2>

<input
type="text"
id="searchProducts"
placeholder="Search products..."
style="
width:100%;
padding:15px;
margin-bottom:20px;
background:#111;
border:1px solid #333;
border-radius:10px;
color:white;
">

<div style="overflow-x:auto;">

<table class="productTable">

<thead>

<tr>

<th>Image</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
<th>Brand</th>
<th>Action</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>

</div>

</div>

<div id="editModal" class="modal">

<div class="modalContent">

<h2>Edit Product</h2>

<input id="editName" placeholder="Product Name">

<input id="editBrand" placeholder="Brand">

<input id="editPrice" type="number" placeholder="Price">

<input id="editStock" type="number" placeholder="Stock">

<select id="editCategory">

<option>Dress</option>
<option>Shoes</option>
<option>Bags</option>
<option>Accessories</option>
<option>Jewelry</option>
<option>Other</option>

</select>

<textarea
id="editDescription"
placeholder="Description"></textarea>

<div class="modalButtons">

<button onclick="saveProduct()">

Save Changes

</button>

<button onclick="closeModal()">

Cancel

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL="https://vqcwqtribfsvezrvjzhh.supabase.co";

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxY3dxdHJpYmZzdmV6cnZqemhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTQxNDQsImV4cCI6MjA5ODY5MDE0NH0.CmTyneCLarQNjp0_m_Lu2cmgpXAUzajg9DWCmzu9RmM";

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const preview=document.getElementById("preview");

document.getElementById("imageFile").addEventListener("change",function(){

const file=this.files[0];

if(!file)return;

preview.src=URL.createObjectURL(file);

preview.style.display="block";

});

document.getElementById("productForm").addEventListener("submit", uploadProduct);

async function uploadProduct(e){

    e.preventDefault();

    const file=document.getElementById("imageFile").files[0];

    if(!file){
        alert("Choose an image first.");
        return;
    }

    try{

        alert("Step 1: Uploading image...");

        const fileName=Date.now()+"-"+file.name;

        const uploadResult=await supabaseClient.storage
            .from("products")
            .upload(fileName,file);

        console.log(uploadResult);

        if(uploadResult.error){
            alert("IMAGE ERROR:\n"+uploadResult.error.message);
            console.error(uploadResult.error);
            return;
        }

        alert("Step 2: Image uploaded");

        const {data}=supabaseClient.storage
            .from("products")
            .getPublicUrl(fileName);

        alert("Step 3: Saving product");

        const insertResult=await supabaseClient
            .from("products")
            .insert([{
                name:"Test Product",
                description:"Test",
                category:"Dress",
                price:100,
                stock:1,
                image:data.publicUrl
            }]);

        console.log(insertResult);

        if(insertResult.error){
            alert("DATABASE ERROR:\n"+insertResult.error.message);
            console.error(insertResult.error);
            return;
        }

        alert("SUCCESS!");
         loadProducts();
		 
    }catch(err){

        console.error(err);

        alert(err.message);

    }

}
async function loadProducts(){

const {data,error}=await supabaseClient
.from("products")
.select("*")
.order("created_at",{ascending:false});

if(error){

console.log(error);

return;

}

document.getElementById("totalProducts").innerHTML=data.length;

const table=document.getElementById("productTable");

table.innerHTML="";

data.forEach(product=>{

table.innerHTML+=`

<tr>

<td>

<img src="${product.image}">

</td>

<td>${product.name}</td>

<td>${product.category}</td>

<td>R ${product.price}</td>

<td>${product.stock}</td>

<td>${product.brand}</td>

<td>

<button
class="editBtn"
onclick="editProduct('${product.id}')">

Edit

</button>

<button
class="deleteBtn"
onclick="deleteProduct('${product.id}')">

Delete

</button>

</td>

</button>

</td>

</tr>

`;
});

}

async function deleteProduct(id){

if(!confirm("Delete this product?")) return;

const {error}=await supabaseClient
.from("products")
.delete()
.eq("id",id);

if(error){

alert(error.message);

return;

}

loadProducts();

}

let currentProductId = null;

async function editProduct(id){

currentProductId=id;

const {data,error}=await supabaseClient
.from("products")
.select("*")
.eq("id",id)
.single();

if(error){

alert(error.message);

return;

}

editName.value=data.name;
editBrand.value=data.brand;
editPrice.value=data.price;
editStock.value=data.stock;
editCategory.value=data.category;
editDescription.value=data.description;

document.getElementById("editModal").style.display="flex";

}

function closeModal(){

document.getElementById("editModal").style.display="none";

}

async function saveProduct(){

const {error}=await supabaseClient
.from("products")
.update({

name:editName.value,

brand:editBrand.value,

price:Number(editPrice.value),

stock:Number(editStock.value),

category:editCategory.value,

description:editDescription.value

})
.eq("id",currentProductId);

if(error){

alert(error.message);

return;

}

closeModal();

loadProducts();

alert("Product Updated!");

}
</script>

</body>
</html>
