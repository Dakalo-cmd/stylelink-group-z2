<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StyleLink Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0d0d0d;
color:white;
}

header{
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
border-bottom:1px solid #222;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:28px;
font-weight:700;
color:#D4AF37;
}

.search{
width:45%;
}

.search input{
width:100%;
padding:12px 18px;
border:none;
outline:none;
border-radius:40px;
background:#1c1c1c;
color:white;
}

.cart{
font-size:18px;
background:#D4AF37;
color:black;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
}

.categories{

display:flex;
justify-content:center;
gap:15px;
padding:30px;
flex-wrap:wrap;
}

.categories button{

padding:12px 25px;
border:none;
border-radius:30px;
background:#181818;
color:#D4AF37;
cursor:pointer;
transition:.3s;
}

.categories button:hover{

background:#D4AF37;
color:black;
}

.container{

width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding-bottom:50px;
}

.card{

background:#181818;
border-radius:18px;
overflow:hidden;
transition:.4s;
}

.card:hover{

transform:translateY(-8px);
box-shadow:0 0 30px rgba(212,175,55,.3);

}

.card img{

width:100%;
height:300px;
object-fit:cover;
}

.info{

padding:20px;
}

.title{

font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.designer{

color:#999;
margin-bottom:10px;
}

.price{

font-size:24px;
font-weight:bold;
color:#D4AF37;
margin-bottom:20px;
}

.buttons{

display:flex;
gap:10px;
}

button{

cursor:pointer;
}

.like{

width:45px;
height:45px;
border:none;
background:#222;
color:white;
border-radius:50%;
font-size:18px;
}

.cartBtn{

flex:1;
border:none;
background:#D4AF37;
padding:12px;
font-weight:bold;
border-radius:10px;
}

.view{

flex:1;
background:none;
border:1px solid #D4AF37;
color:#D4AF37;
border-radius:10px;
}

@media(max-width:768px){

header{

flex-direction:column;
gap:15px;
}

.search{

width:100%;
}

}

.cartPanel{

position:fixed;
top:0;
right:-420px;

width:400px;
max-width:100%;
height:100vh;

background:#181818;

padding:25px;

transition:.4s;

overflow:auto;

z-index:9999;

box-shadow:-5px 0 20px rgba(0,0,0,.5);

}

.cartPanel.open{

right:0;

}

.cartItem{

display:flex;

justify-content:space-between;

align-items:center;

margin:15px 0;

padding-bottom:15px;

border-bottom:1px solid #333;

}

.checkoutBtn{

width:100%;

padding:15px;

background:#D4AF37;

border:none;

font-size:18px;

font-weight:bold;

border-radius:10px;

cursor:pointer;

margin-top:20px;

}

</style>

</head>
<body>

<header>

<div class="logo">
StyleLink
</div>

<div class="search">

<input
type="text"
id="search"
placeholder="Search fashion...">

</div>

<div class="cart" onclick="toggleCart()">

🛒 Cart (<span id="cartCount">0</span>)

</div>

</header>

<div class="categories">

<button onclick="filterItems('All')">All</button>
<button onclick="filterItems('Dress')">Dress</button>
<button onclick="filterItems('Shoes')">Shoes</button>
<button onclick="filterItems('Bag')">Bags</button>
<button onclick="filterItems('Accessories')">Accessories</button>

</div>

<div class="container" id="products">

</div>

<div id="cartPanel" class="cartPanel">

<h2>Shopping Cart</h2>

<div id="cartItems">

Your cart is empty.

</div>

<h3 style="margin-top:20px;">
Total: R<span id="cartTotal">0.00</span>
</h3>

<button class="checkoutBtn">
Checkout
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://vqcwqtribfsvezrvjzhh.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxY3dxdHJpYmZzdmV6cnZqemhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTQxNDQsImV4cCI6MjA5ODY5MDE0NH0.CmTyneCLarQNjp0_m_Lu2cmgpXAUzajg9DWCmzu9RmM";

const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let products = [];
let cart = JSON.parse(localStorage.getItem("stylelink_cart")) || [];

// Load products from Supabase
async function loadProducts() {

    const { data, error } = await supabaseClient
        .from("products")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error("Supabase Error:", error);
        return;
    }

    products = data;
    display(products);

}

// Display Products
function display(data){

    const container = document.getElementById("products");

    container.innerHTML = "";

    data.forEach(item=>{

        container.innerHTML += `

        <div class="card">

            <img src="${item.image}" alt="${item.name}">

            <div class="info">

                <div class="title">
                    ${item.name}
                </div>

                <div class="designer">
                    ${item.category}
                </div>

                <div class="price">
                    R ${Number(item.price).toLocaleString(undefined,{
                        minimumFractionDigits:2,
                        maximumFractionDigits:2
                    })}
                </div>

                <p style="color:#999;font-size:14px;margin:10px 0;">
                    ${item.description}
                </p>

                <p style="color:#D4AF37;">
                    ⭐ ${item.rating}
                    (${item.review_count} Reviews)
                </p>

                <p style="margin:8px 0;">
                    Stock: ${item.stock}
                </p>

                <div class="buttons">

                    <button class="like" onclick="like(this)">
                        ❤
                    </button>

                    <button class="cartBtn" onclick="addCart('${item.id}')">
                     Add To Cart
                    </button>
                    <button class="view">
                        View
                    </button>

                </div>

            </div>

        </div>

        `;

    });

}

// Like Button
function like(button) {

    if(button.style.color=="red"){

        button.style.color="white";

    }else{

        button.style.color="red";

    }

}

// Cart
function addCart(productId){

    const product = products.find(p => p.id === productId);

    if(!product){

        alert("Product not found");

        return;

    }

    const existing = cart.find(item => item.id === product.id);

    if(existing){

        existing.quantity++;

    }else{

        cart.push({

            ...product,

            quantity:1

        });

    }

    updateCart();

    alert(product.name + " added to cart!");

}
function updateCart(){

    document.getElementById("cartCount").textContent = cart.reduce((total,item)=>{

        return total + item.quantity;

    },0);

    localStorage.setItem(

        "stylelink_cart",

        JSON.stringify(cart)

    );

}

function toggleCart(){

document
.getElementById("cartPanel")
.classList.toggle("open");

renderCart();

}

function renderCart(){

const container=document.getElementById("cartItems");

container.innerHTML="";

let total=0;

if(cart.length===0){

container.innerHTML="Your cart is empty.";

document.getElementById("cartTotal").textContent="0.00";

return;

}

cart.forEach(item=>{

total+=item.price*item.quantity;

container.innerHTML+=`

<div class="cartItem">

<div>

<strong>${item.name}</strong>

<br>

Qty: ${item.quantity}

</div>

<div>

R ${(item.price*item.quantity).toFixed(2)}

</div>

</div>

`;

});

document.getElementById("cartTotal").textContent=total.toFixed(2);

}

// Category Filter
function filterItems(category){

    if(category==="All"){

        display(products);

        return;

    }

    const filtered = products.filter(item=>item.category===category);

    display(filtered);

}

// Search
document.getElementById("search").addEventListener("input",function(){

    const value=this.value.toLowerCase();

    const filtered = products.filter(item=>

        item.name.toLowerCase().includes(value) ||

        item.category.toLowerCase().includes(value)

    );

    display(filtered);

});

// Start App
loadProducts();

updateCart();

</script>
</body>
</html>
